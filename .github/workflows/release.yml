# Release — on a v* tag: gate, build, package the MSI, publish a GitHub release.
# The app self-updates from the latest release's .msi, so a release must carry one.
#
# KEEP IN SYNC WITH ci.yml — toolchain pin, components, and the fmt/clippy/test
# gates must match (see ci.yml header). The crate lives in app/, so cargo steps
# run there (defaults.run); upload-artifact paths stay repo-root-relative.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

defaults:
  run:
    working-directory: app

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Verify tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tag   = "${{ github.ref_name }}" -replace '^v',''
          $cargo = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"').Matches.Groups[1].Value
          if ($tag -ne $cargo) {
            Write-Error "tag '$tag' does not match Cargo.toml version '$cargo' — bump app/Cargo.toml before tagging"
            exit 1
          }
          echo "Release version: $tag"

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: Build release
        run: cargo build --release

      - name: Cache cargo-wix
        id: wix-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-wix.exe
          key: cargo-wix-${{ runner.os }}-rust-1.93.1

      - name: Install cargo-wix (cache miss)
        if: steps.wix-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-wix --locked

      - name: Download WiX 3.11 portable binaries
        shell: pwsh
        run: |
          $url  = 'https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip'
          $zip  = "$env:TEMP\wix311.zip"
          $dest = "$env:TEMP\wix311"
          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath $dest
          echo "$dest" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI installer
        run: cargo wix --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v5
        with:
          name: synthetrix-windows-msi
          path: app/target/wix/*.msi

      - uses: actions/upload-artifact@v5
        with:
          name: synthetrix-windows
          path: app/target/release/synthetrix.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/synthetrix-windows/synthetrix.exe
            artifacts/synthetrix-windows-msi/*.msi
          generate_release_notes: true
